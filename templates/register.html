{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Easy Loan App - Register</title>
  <script src="{% static 'js/script.js' %}"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body class="min-h-screen bg-surface text-on-surface flex items-center justify-center p-6">
  <div class="w-full max-w-2xl bg-surface-container-lowest rounded-xl shadow-xl p-8">
    <div class="mb-8">
      <p class="text-sm font-semibold text-secondary uppercase tracking-[0.2em]">Easy Loan App</p>
      <h1 class="text-3xl font-headline font-extrabold text-primary mt-2">Create your account</h1>
      <p class="text-sm text-on-surface-variant mt-2">Start your application and manage repayments online.</p>
    </div>

    <form action="{% url 'dashboard' %}" method="get" class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <input name="first_name" type="text" class="rounded-xl border-outline-variant bg-surface-container-low" placeholder="First name">
      <input name="last_name" type="text" class="rounded-xl border-outline-variant bg-surface-container-low" placeholder="Last name">
      <input name="email" type="email" class="rounded-xl border-outline-variant bg-surface-container-low md:col-span-2" placeholder="Email address">
      <input name="phone" type="text" class="rounded-xl border-outline-variant bg-surface-container-low" placeholder="Phone number">
      <input name="income" type="text" class="rounded-xl border-outline-variant bg-surface-container-low" placeholder="Monthly income">
      <input name="password" type="password" class="rounded-xl border-outline-variant bg-surface-container-low" placeholder="Password">
      <input name="confirm_password" type="password" class="rounded-xl border-outline-variant bg-surface-container-low" placeholder="Confirm password">
      <button type="submit" class="md:col-span-2 rounded-xl bg-primary text-white py-3 font-semibold shadow-lg shadow-primary/20">
        Continue to Dashboard
      </button>
    </form>

    <p class="text-sm text-on-surface-variant mt-6">
      Already registered?
      <a href="{% url 'login' %}" class="text-primary font-semibold">Sign in here</a>
    </p>
  </div>
</body>
</html>
