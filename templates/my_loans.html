{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Easy Loan App - My Loans</title>
  <script src="{% static 'js/script.js' %}"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body class="min-h-screen bg-surface text-on-surface p-6 md:p-10">
  <div class="max-w-5xl mx-auto">
    <div class="flex items-center justify-between mb-8">
      <div>
        <p class="text-sm font-semibold text-secondary uppercase tracking-[0.2em]">Easy Loan App</p>
        <h1 class="text-3xl font-headline font-extrabold text-primary mt-2">My Loans</h1>
      </div>
      <div class="flex gap-4">
        <a href="{% url 'apply_loan' %}" class="text-primary font-semibold">Apply Loan</a>
        <a href="{% url 'dashboard' %}" class="text-primary font-semibold">Dashboard</a>
      </div>
    </div>

    <div class="grid gap-4">
      <div class="bg-surface-container-lowest rounded-xl shadow-sm p-6 border-l-4 border-primary">
        <p class="text-xs uppercase tracking-[0.2em] text-outline mb-2">Education Loan</p>
        <h2 class="text-2xl font-headline font-bold text-primary">$12,450 Remaining</h2>
        <p class="text-sm text-on-surface-variant mt-2">Next payment: Oct 24, 2023</p>
      </div>
      <div class="bg-surface-container-lowest rounded-xl shadow-sm p-6 border-l-4 border-secondary">
        <p class="text-xs uppercase tracking-[0.2em] text-outline mb-2">Personal Loan</p>
        <h2 class="text-2xl font-headline font-bold text-primary">$4,800 Remaining</h2>
        <p class="text-sm text-on-surface-variant mt-2">Status: In review</p>
      </div>
    </div>
  </div>
</body>
</html>
